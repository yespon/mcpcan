name: Auto Release

# 触发条件：仅主分支 push 自动触发（禁止手动触发）
on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 授予创建Release/Tag的权限
      pull-requests: read

    steps:
      # 步骤1：检出代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 拉取完整提交历史，用于生成Release Notes

      # 步骤2：读取VERSION文件，并检查Tag是否已存在
      - name: Read VERSION file
        id: version
        run: |
          if [ -f "VERSION" ]; then
            VERSION=$(cat VERSION | tr -d '\n\r' | xargs)
            echo "Read version from file: $VERSION"
            echo "tag=$VERSION" >> $GITHUB_OUTPUT
            # 检查 tag 是否已存在（避免重复触发时重复创建）
            if git ls-remote --tags origin "refs/tags/${VERSION}" | grep -q "${VERSION}"; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "⚠️ Tag ${VERSION} already exists, skipping release creation."
            else
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "❌ VERSION file not found"
            exit 1
          fi

      # 步骤3：创建GitHub Release（仅在 tag 不存在时）
      - name: Create Release
        if: steps.version.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body_path: .github/workflows/release.md # 使用指定文件作为 Release Note
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 在发布完成后触发Pages部署
  deploy-pages:
    needs: release
    uses: ./.github/workflows/gh-pages.yml
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: read
