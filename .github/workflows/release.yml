name: Auto Release

# 触发条件：正式版本 Tag 推送触发（如 v2.1.2）
on:
  push:
    tags:
      - 'v*.*.*'   # 仅正式版本 Tag（如 v2.1.2）触发
  workflow_dispatch: # 保留面板手动重跑功能

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 授予创建Release/Tag的权限
      pull-requests: read

    steps:
      # 步骤1：检出代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 拉取完整提交历史，用于生成Release Notes

      # 步骤2：读取VERSION文件
      - name: Read VERSION file
        id: version
        run: |
          if [ -f "VERSION" ]; then
            VERSION=$(cat VERSION | tr -d '\n\r' | xargs)
            echo "Read version from file: $VERSION"
            echo "tag=$VERSION" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "❌ VERSION file not found"
            exit 1
          fi

      # 步骤3：创建GitHub Release（即便是已存在的Tag也会自动更新或绑定Release）
      - name: Create Release
        if: steps.version.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body_path: .github/workflows/release.md # 使用指定文件作为 Release Note
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 在发布完成后触发Pages部署
  deploy-pages:
    needs: release
    uses: ./.github/workflows/gh-pages.yml
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: read
