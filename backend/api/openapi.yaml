components:
    schemas:
        AddUserRoleRequest:
            type: object
            properties:
                userIds:
                    type: array
                    items:
                        type: string
                    description: '@inject_tag: json:"userIds" desc:"用户ID列表"'
                roleId:
                    type: string
                    description: '@inject_tag: json:"roleId" desc:"角色ID"'
        AddUserRoleResponse:
            type: object
            properties: {}
        AvailableCasesResponse:
            type: object
            properties:
                cases:
                    type: array
                    items:
                        $ref: '#/components/schemas/CaseInfo'
                    description: '@inject_tag: json:"cases" desc:"可用案例列表"'
            description: AvailableCasesResponse 可用案例响应
        BatchAddUserRoleRequest:
            type: object
            properties:
                userId:
                    type: string
                    description: '@inject_tag: json:"userId" form:"userId" desc:"用户ID"'
                roleIds:
                    type: array
                    items:
                        type: string
                    description: '@inject_tag: json:"roleIds" form:"roleIds" desc:"角色ID列表"'
            description: BatchAddUserRoleRequest 批量添加用户角色关联请求
        BatchAddUserRoleResponse:
            type: object
            properties:
                code:
                    type: integer
                    description: '@inject_tag: json:"code" desc:"响应状态码"'
                    format: int32
                message:
                    type: string
                    description: '@inject_tag: json:"message" desc:"响应消息"'
                data:
                    type: array
                    items:
                        $ref: '#/components/schemas/UserRole'
                    description: '@inject_tag: json:"data" desc:"批量添加的用户角色关联列表"'
            description: BatchAddUserRoleResponse 批量添加用户角色关联响应
        BatchDeleteDeptResponse:
            type: object
            properties:
                code:
                    type: integer
                    description: '@inject_tag: json:"code" desc:"响应码"'
                    format: int32
                message:
                    type: string
                    description: '@inject_tag: json:"message" desc:"响应消息"'
        BatchDeleteRolesRequest:
            type: object
            properties:
                ids:
                    type: array
                    items:
                        type: string
                    description: '@inject_tag: json:"ids" desc:"角色ID列表"'
            description: 批量删除角色请求
        BatchDeleteRolesResponse:
            type: object
            properties: {}
            description: 批量删除角色响应
        BatchDeleteUserRequest:
            type: object
            properties:
                userIds:
                    type: array
                    items:
