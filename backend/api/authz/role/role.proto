syntax = "proto3";

package authz.role;

import "google/api/annotations.proto";

option go_package = "github.com/kymo-mcp/mcpcan/api/authz/role";


// 角色信息
message SysRole {
  // @inject_tag: json:"id" desc:"角色ID"
  int64 id = 1;                
  // @inject_tag: json:"name" desc:"角色名称"
  string name = 2;             
  // @inject_tag: json:"level" desc:"角色级别"
  int64 level = 3;
  // @inject_tag: json:"description" desc:"角色描述"
  string description = 4;      
  // @inject_tag: json:"dataScope" desc:"数据权限"
  string dataScope = 5;
  // @inject_tag: json:"createdAt" desc:"创建时间"
  int64 createdAt = 7;         
  // @inject_tag: json:"updatedAt" desc:"更新时间"
  int64 updatedAt = 8;         
  // @inject_tag: json:"createdBy" desc:"创建者"
  string createdBy = 9;        
  // @inject_tag: json:"updatedBy" desc:"更新者"
  string updatedBy = 10;       
}

// 查询条件
message RoleQuery {
  // @inject_tag: json:"blurry" desc:"模糊查询(角色名称/编码)"
  string blurry = 1;           
}

// 创建角色请求
message CreateRoleRequest {
  // @inject_tag: json:"name" desc:"角色名称"
  string name = 1;             
  // @inject_tag: json:"level" desc:"角色级别"
  int64 level = 2;
  // @inject_tag: json:"description" desc:"角色描述"
  string description = 3;
  // @inject_tag: json:"dataScope" desc:"数据权限"
  string dataScope = 4;
}

// 创建角色响应
message CreateRoleResponse {
  // @inject_tag: json:"role" desc:"创建的角色信息"
  SysRole role = 1;  
}

// 更新角色请求
message UpdateRoleRequest {
  // @inject_tag: json:"id" desc:"角色ID"
  int64 id = 1;                
  // @inject_tag: json:"name" desc:"角色名称"
  string name = 2;             
  // @inject_tag: json:"level" desc:"角色级别"
  int64 level = 3;
  // @inject_tag: json:"description" desc:"角色描述"
  string description = 4;
  // @inject_tag: json:"dataScope" desc:"数据权限"
  string dataScope = 5;
}

// 更新角色响应
message UpdateRoleResponse {
  // @inject_tag: json:"role" desc:"更新后的角色信息"
  SysRole role = 1;  
}


// 删除角色请求
message DeleteRoleRequest {
  // @inject_tag: json:"id" uri:"id" binding:"required" desc:"角色ID"
  int64 id = 1;  
}

// 删除角色响应
message DeleteRoleResponse {
  // 空响应
}

// 批量删除角色请求
message BatchDeleteRolesRequest {
  // @inject_tag: json:"ids" desc:"角色ID列表"
  repeated int64 ids = 1;
}

// 批量删除角色响应
message BatchDeleteRolesResponse {
  // 空响应
}



// 角色列表请求
message ListRolesRequest {
  // @inject_tag: json:"blurry" desc:"模糊查询(角色名称/编码)"
  string blurry = 1;
  // @inject_tag: json:"page" desc:"当前页码"
  int32 page = 2;
  // @inject_tag: json:"size" desc:"每页大小"
  int32 size = 3;
}

// 角色列表响应
message ListRolesResponse {
  // @inject_tag: json:"list" desc:"角色列表"
  repeated SysRole list = 1;
  // @inject_tag: json:"total" desc:"总记录数"
  int64 total = 2;
}

message SaveRoleMenusRequest {
  // @inject_tag: json:"roleID" desc:"角色ID"
  int64 roleID = 1;
  // @inject_tag: json:"menuIDs" desc:"菜单ID列表"
  repeated int64 menuIDs = 2;
}

message SaveRoleMenusResponse {

}

message FindRoleMenusRequest {
  repeated int64 roleIDs = 1;
}

message SysRoleMenu {
  // @inject_tag: json:"id" desc:"菜单ID"
  int64 id = 1;
  // @inject_tag: json:"name" desc:"菜单名称"
  string name = 2;
  // @inject_tag: json:"permission" desc:"菜单权限标识"
  string permission = 3;
  // @inject_tag: json:"roleId" desc:"角色ID"
  int64 roleId = 4;
}

message FindRoleMenusResponse {
  // @inject_tag: json:"menus" desc:"角色菜单列表"
  repeated SysRoleMenu menus = 1;
  // @inject_tag: json:"permissions" desc:"权限列表"
  repeated string permissions = 2;
}

// 角色服务
service RoleService {
  // 创建角色
  rpc CreateRole(CreateRoleRequest) returns (CreateRoleResponse) {
    option (google.api.http) = {
      post: "/authz/roles"
      body: "*"
    };
  }

  // 更新角色
  rpc UpdateRole(UpdateRoleRequest) returns (UpdateRoleResponse) {
    option (google.api.http) = {
      put: "/authz/roles"
      body: "*"
    };
  }

  // 删除角色
  rpc DeleteRole(DeleteRoleRequest) returns (DeleteRoleResponse) {
    option (google.api.http) = {
      delete: "/authz/roles/{id}"
    };
  }

  rpc BatchDeleteRoles(BatchDeleteRolesRequest) returns (BatchDeleteRolesResponse) {
    option (google.api.http) = {
      delete: "/authz/roles/batch"
      body: "*"
    };
  }

  rpc ListRoles(ListRolesRequest) returns (ListRolesResponse) {
    option (google.api.http) = {
      get: "/authz/roles/list-roles"
    };
  }

  rpc SaveRoleMenus(SaveRoleMenusRequest) returns (SaveRoleMenusResponse) {
    option (google.api.http) = {
      post: "/authz/roles/menus"
      body: "*"
    };
  }

  rpc FindRoleMenus(FindRoleMenusRequest) returns (FindRoleMenusResponse) {
    option (google.api.http) = {
      post: "/authz/roles/find-menus"
    };
  }
}