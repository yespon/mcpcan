// TemplateEditRequest template edit request
message TemplateEditRequest {
  // @inject_tag: json:"templateId" form:"templateId" uri:"templateId" desc:"Template ID"
  int32 templateId = 1;
  // @inject_tag: json:"name" form:"name" desc:"Instance name"
  string name = 2;
  // @inject_tag: json:"port" form:"port" desc:"Port"
  int32 port = 3;
  // @inject_tag: json:"initScript" form:"initScript" desc:"Initialization script"
  string initScript = 4;
  // @inject_tag: json:"command" form:"command" desc:"Startup command"
  string command = 5;
  // @inject_tag: json:"environmentVariables" form:"environmentVariables" desc:"Environment variables"
  map<string, string> environmentVariables = 6;
  // @inject_tag: json:"volumeMounts" form:"volumeMounts" desc:"Volume mount list"
  repeated VolumeMount volumeMounts = 7;
  // @inject_tag: json:"startupTimeout" form:"startupTimeout" desc:"Startup timeout (seconds)"
  int32 startupTimeout = 8;
  // @inject_tag: json:"runningTimeout" form:"runningTimeout" desc:"Running timeout (seconds)"
  int32 runningTimeout = 9;
  // @inject_tag: json:"environmentId" form:"environmentId" desc:"Environment ID"
  int32 environmentId = 10;
  // @inject_tag: json:"packageId,omitempty" form:"packageId" desc:"Package ID, optional"
  string packageId = 11;
  // @inject_tag: json:"accessType" form:"accessType" desc:"Deployment mode"
  AccessType accessType = 12;
  // @inject_tag: json:"mcpServers" form:"mcpServers" desc:"MCP server configuration"
  string mcpServers = 13;
  // @inject_tag: json:"imgAddress" form:"imgAddress" desc:"Image address"
  string imgAddress = 14;
  // @inject_tag: json:"mcpServerId" form:"mcpServerId" desc:"MCP server ID"
  string mcpServerId = 16;
  // @inject_tag: json:"notes" form:"notes" desc:"Notes"
  string notes = 18;
  // @inject_tag: json:"mcpProtocol" form:"mcpProtocol" desc:"MCP protocol"
  McpProtocol mcpProtocol = 19;
  // @inject_tag: json:"iconPath" form:"iconPath" desc:"Icon path"
  string iconPath = 20;
  // @inject_tag: json:"openapiBaseUrl" form:"openapiBaseUrl" desc:"OpenAPI base URL"
  string openapiBaseUrl = 25;
}

// TemplateEditResp template edit response
message TemplateEditResp {
  // @inject_tag: json:"message" desc:"Response message"
  string message = 1;
}

// TemplateListRequest template list request
message TemplateListRequest {
  // @inject_tag: json:"page" form:"page" desc:"Page number"
  int32 page = 1;
  // @inject_tag: json:"pageSize" form:"pageSize" desc:"Page size"
  int32 pageSize = 2;
  // @inject_tag: json:"templateId" form:"templateId" desc:"Template ID"
  int32 templateId = 3;
  // @inject_tag: json:"name" form:"name" desc:"Template name"
  string name = 4;
  // @inject_tag: json:"accessType" form:"accessType" desc:"Deployment mode"
  AccessType accessType = 5;
  // @inject_tag: json:"mcpProtocol" form:"mcpProtocol" desc:"MCP protocol"
  McpProtocol mcpProtocol = 6;
}

// TemplateListResp template list response
message TemplateListResp {
  // @inject_tag: json:"list" desc:"Template list"
  repeated TemplateDetailResp list = 1;
  // @inject_tag: json:"total" desc:"Total records"
  int32 total = 2;
  // @inject_tag: json:"page" desc:"Current page number"
  int32 page = 3;
  // @inject_tag: json:"pageSize" desc:"Page size"
  int32 pageSize = 4;
}

// TemplateDeleteRequest template delete request
message TemplateDeleteRequest {
  // @inject_tag: json:"templateId" form:"templateId" uri:"templateId" desc:"Template ID"
  int32 templateId = 1;
}

// TemplateDeleteResp template delete response
message TemplateDeleteResp {}

// TokenControlRequest control token enable/disable request
message TokenControlRequest {
  // @inject_tag: json:"instanceId" form:"instanceId" uri:"instanceId" desc:"Instance ID"
  string instanceId = 1;
  // @inject_tag: json:"enabledToken" form:"enabledToken" desc:"Whether to enable token"
  bool enabledToken = 2;
}

// TokenControlResponse control token enable/disable response
message TokenControlResponse {
  // @inject_tag: json:"instanceId" desc:"Instance ID"
  string instanceId = 1;
  // @inject_tag: json:"enabledToken" desc:"Whether token is enabled"
  bool enabledToken = 2;
  // @inject_tag: json:"message" desc:"Response message"
  string message = 3;
}

// TokenListByInstanceIDRequest token list request
message TokenListByInstanceIDRequest {
  // @inject_tag: json:"instanceId" form:"instanceId" uri:"instanceId" desc:"Instance ID"
  string instanceId = 1;
  // @inject_tag: json:"token" form:"token" desc:"Token"
  string token = 2;
  // @inject_tag: json:"usages" form:"usages" desc:"Token usage scenarios"
  repeated string usages = 3;
}

// TokenListByInstanceIDResponse token list response
message TokenListByInstanceIDResponse {
  // @inject_tag: json:"tokens" desc:"Token list"
  repeated McpToken list = 2;
}

// TokenEditRequest edit tokens request
message TokenEditRequest {
  // @inject_tag: json:"tokens" form:"tokens" desc:"Token list"
  repeated McpToken tokens = 2;
}

// TokenEditResponse edit tokens response
message TokenEditResponse {
  // @inject_tag: json:"message" desc:"Response message"
  string message = 1;
}

// TokenDeleteRequest delete token request
message TokenDeleteRequest {
  // @inject_tag: json:"id" form:"id" uri:"id" desc:"Token ID"
  int64 id = 1;
}

// TokenDeleteResponse delete token response
message TokenDeleteResponse {
  // @inject_tag: json:"message" desc:"Response message"
  string message = 1;
}

// CreateOpenapiRequest create instance request
message CreateOpenapiRequest {
  // @inject_tag: json:"name" form:"name" desc:"Instance name"
  string name = 1;
  // @inject_tag: json:"openapiFileID,omitempty" form:"openapiFileID" desc:"OpenAPI document ID, required"
  string openapiFileID = 2;
  // @inject_tag: json:"notes" form:"notes" desc:"Description"
  string notes = 3;
  // @inject_tag: json:"chooseOpenapiFileID" form:"chooseOpenapiFileID" desc:"Selected OpenAPI document ID"
  string chooseOpenapiFileID = 4;
  // @inject_tag: json:"enabledToken" form:"enabledToken" desc:"Enable tokens"
  bool enabledToken = 5;
  // @inject_tag: json:"tokens" form:"tokens" desc:"Token list"
  repeated McpToken tokens = 6;
  // @inject_tag: json:"environmentId" form:"environmentId" desc:"Environment ID"
  int32 environmentId = 7;
  // @inject_tag: json:"iconPath" form:"iconPath" desc:"Icon path"
  string iconPath = 8;
  // @inject_tag: json:"openapiBaseUrl" form:"openapiBaseUrl" desc:"Base access path"
  string openapiBaseUrl = 9;
}

// UpdateOpenapiRequest edit instance request
message UpdateOpenapiRequest {
  // @inject_tag: json:"instanceId" form:"instanceId" desc:"Instance ID"
  string instanceId = 1;
  // @inject_tag: json:"name" form:"name" desc:"Instance name"
  string name = 2;
  // @inject_tag: json:"openapiFileID,omitempty" form:"openapiFileID" desc:"OpenAPI document ID, required"
  string openapiFileID = 3;
  // @inject_tag: json:"notes" form:"notes" desc:"Description"
  string notes = 4;
  // @inject_tag: json:"chooseOpenapiFileID" form:"chooseOpenapiFileID" desc:"Selected OpenAPI document ID"
  string chooseOpenapiFileID = 5;
  // @inject_tag: json:"iconPath" form:"iconPath" desc:"Icon path"
  string iconPath = 6;
  // @inject_tag: json:"openapiBaseUrl" form:"openapiBaseUrl" desc:"Base access path"
  string openapiBaseUrl = 7;
}

// InstanceService instance management service
service InstanceService {
  // Create instance
  rpc Create(CreateRequest) returns (CreateResp) {
    option (google.api.http) = {
      post: "/instance/create",
      body: "*",
    };
  }
  // Instance detail
  rpc Detail(DetailRequest) returns (DetailResp) {
    option (google.api.http) = {
      get: "/instance/{instanceId}",
    };
  }
  // Edit instance
  rpc Edit(EditRequest) returns (EditResp) {
    option (google.api.http) = {
      put:  "/instance/edit",
      body: "*",
    };
  }
  // Instance list
  rpc List(ListRequest) returns (ListResp) {
    option (google.api.http) = {
      post: "/instance/list",
      body: "*",
    };
  }
  // Disable instance
  rpc Disabled(DisabledRequest) returns (DisabledResp) {
    option (google.api.http) = {
      put:  "/instance/disabled",
      body: "*",
    };
  }
  // Restart instance
  rpc Restart(RestartRequest) returns (RestartResp) {
    option (google.api.http) = {
      put:  "/instance/restart",
      body: "*",
    };
  }
  // Instance status probe
  rpc Status(GetStatusRequest) returns (GetStatusResp) {
    option (google.api.http) = {
      get: "/instance/status/{instanceId}",
    };
  }
  // Delete instance
  rpc Delete(DeleteRequest) returns (DeleteResp) {
    option (google.api.http) = {
      delete: "/instance/{instanceId}",
    };
  }
  // View instance runtime logs
  rpc Logs(LogsRequest) returns (LogsResp) {
    option (google.api.http) = {
      post: "/instance/logs",
      body: "*",
    };
  }

  // Create template
  rpc TemplateCreate(TemplateCreateRequest) returns (TemplateCreateResp) {
    option (google.api.http) = {
      post: "/template/create",
      body: "*",
    };
  }
  // Template detail
  rpc TemplateDetail(TemplateDetailRequest) returns (TemplateDetailResp) {
    option (google.api.http) = {
      get: "/template/{templateId}",
    };
  }
  // Edit template
  rpc TemplateEdit(TemplateEditRequest) returns (TemplateEditResp) {
    option (google.api.http) = {
      put:  "/template/edit",
      body: "*",
    };
  }
  // Template list
  rpc TemplateList(TemplateListRequest) returns (TemplateListResp) {
    option (google.api.http) = {
      post: "/template/list",
      body: "*",
    };
  }
  // Delete template
  rpc TemplateDelete(TemplateDeleteRequest) returns (TemplateDeleteResp) {
    option (google.api.http) = {
      delete: "/template/{templateId}",
    };
  }

  // Control token enable/disable
  rpc TokenControl(TokenControlRequest) returns (TokenControlResponse) {
    option (google.api.http) = {
      put:  "/instance/token/control",
      body: "*",
    };
  }

  // Token list
  rpc TokenListByInstanceID(TokenListByInstanceIDRequest) returns (TokenListByInstanceIDResponse) {
    option (google.api.http) = {
      post: "/instance/token/list",
      body: "*",
    };
  }

  // Edit tokens
  rpc TokenEdit(TokenEditRequest) returns (TokenEditResponse) {
    option (google.api.http) = {
      put:  "/instance/token/edit",
      body: "*",
    };
  }

  // Delete token
  rpc TokenDelete(TokenDeleteRequest) returns (TokenDeleteResponse) {
    option (google.api.http) = {
      post: "/instance/token/delete",
      body: "*",
    };
  }

  // Create Openapi instance
  rpc OpenapiCreate(CreateOpenapiRequest) returns (CreateResp) {
    option (google.api.http) = {
      post: "/instance/openapi/create",
      body: "*",
    };
  }

  // Edit Openapi instance
  rpc OpenapiUpdate(UpdateOpenapiRequest) returns (EditResp) {
    option (google.api.http) = {
      put:  "/instance/openapi/edit",
      body: "*",
    };
  }
}
