syntax = "proto3";

package instance;

import "google/api/annotations.proto";

option go_package = "github.com/kymo-mcp/mcpcan/api/market/instance";

enum AccessType {
  AccessTypeUnknown = 0;
  DIRECT            = 1;
  PROXY             = 2;
  HOSTING           = 3;
}

enum McpProtocol {
  McpProtocolUnknown = 0;
  SSE                = 1;
  STEAMABLE_HTTP     = 2;
  STDIO              = 3;
}

enum SourceType {
  SourceTypeUnknown = 0;
  // MCP market
  MARKET = 1;
  // Instance template
  TEMPLATE = 2;
  // Custom
  CUSTOM = 3;
  // Openapi
  OPENAPI = 4;
}

// AccessConfig access configuration
message AccessConfig {
  // @inject_tag: json:"type" desc:"access type (e.g., http, https)"
  string type = 1;
  // @inject_tag: json:"url" desc:"access URL"
  string url = 2;
}

// GetStatusRequest instance status probe request
message GetStatusRequest {
  // @inject_tag: json:"instanceId" form:"instanceId" uri:"instanceId" desc:"Instance ID"
  string instanceId = 1;
}

// DataForStatus status data
message DataForStatus {
  // @inject_tag: json:"instanceId" desc:"Instance ID"
  string instanceId = 1;
  // @inject_tag: json:"status" desc:"Instance status"
  string status = 2;
}

// ContainerStatus container status information
message ContainerStatus {
  // @inject_tag: json:"instanceId" desc:"Instance ID"
  string instanceId = 1;
  // @inject_tag: json:"containerName" desc:"Container name"
  string containerName = 2;
  // @inject_tag: json:"isReady" desc:"Ready status"
  bool isReady = 3;
  // @inject_tag: json:"runInfo" desc:"Runtime information"
  string runInfo = 4;
  // @inject_tag: json:"lastCheckTime" desc:"Last check time (timestamp)"
  int64 lastCheckTime = 5;
  // @inject_tag: json:"error" desc:"Error message"
  string error = 6;
}

// CreateRequest create instance request
message CreateRequest {
  // @inject_tag: json:"name" form:"name" desc:"Instance name"
  string name = 1;
  // @inject_tag: json:"port" form:"port" desc:"Port"
  int32 port = 2;
  // @inject_tag: json:"initScript" form:"initScript" desc:"Initialization script"
  string initScript = 3;
  // @inject_tag: json:"command" form:"command" desc:"Startup command"
  string command = 4;
  // @inject_tag: json:"environmentVariables" form:"environmentVariables" desc:"Environment variables"
  map<string, string> environmentVariables = 5;
  // @inject_tag: json:"volumeMounts" form:"volumeMounts" desc:"Volume mount list"
  repeated VolumeMount volumeMounts = 6;
  // @inject_tag: json:"startupTimeout" form:"startupTimeout" desc:"Startup timeout (seconds)"
  int32 startupTimeout = 7;
  // @inject_tag: json:"runningTimeout" form:"runningTimeout" desc:"Running timeout (seconds)"
  int32 runningTimeout = 8;
  // @inject_tag: json:"environmentId" form:"environmentId" desc:"Environment ID"
  int32 environmentId = 9;
  // @inject_tag: json:"packageId,omitempty" form:"packageId" desc:"Package ID, optional"
  string packageId = 10;
  // @inject_tag: json:"accessType" form:"accessType" desc:"Access mode"
  AccessType accessType = 11;
  // @inject_tag: json:"mcpServers" form:"mcpServers" desc:"MCP server configuration"
  string mcpServers = 12;
  // @inject_tag: json:"imgAddress" form:"imgAddress" desc:"Image address"
  string imgAddress = 13;
  // @inject_tag: json:"sourceType" form:"sourceType" desc:"Instance source"
  SourceType sourceType = 14;
  // @inject_tag: json:"mcpServerId" form:"mcpServerId" desc:"MCP server ID"
  string mcpServerId = 15;
  // @inject_tag: json:"templateId" form:"templateId" desc:"Template ID"
  int32 templateId = 16;
  // @inject_tag: json:"tokens" form:"tokens" desc:"Token list"
  repeated McpToken tokens = 17;
  // @inject_tag: json:"notes" form:"notes" desc:"Notes"
  string notes = 18;
  // @inject_tag: json:"mcpProtocol" form:"mcpProtocol" desc:"MCP protocol"
  McpProtocol mcpProtocol = 19;
  // @inject_tag: json:"servicePath" form:"servicePath" desc:"Service path"
  string servicePath = 20;
  // @inject_tag: json:"iconPath" form:"iconPath" desc:"Icon path"
  string iconPath = 21;
  // @inject_tag: json:"enabledToken" form:"enabledToken" desc:"Enable tokens"
  bool enabledToken = 22;
}

// McpToken MCP token
message McpToken {
  // @inject_tag: json:"id" desc:"Token ID"
  int64 id = 1;
  // @inject_tag: json:"token" desc:"Token content"
  string token = 2;
  // @inject_tag: json:"headers" desc:"Optional custom headers"
  map<string, string> headers = 3;
  // @inject_tag: json:"enabled" desc:"Whether to enable the token"
  bool enabled = 4;
  // @inject_tag: json:"expireAt" desc:"Expiration time"
  int64 expireAt = 5;
  // @inject_tag: json:"publishAt" desc:"Publish time"
  int64 publishAt = 6;
  // @inject_tag: json:"usages" desc:"List of usage scenarios"
  repeated string usages = 7;
  // @inject_tag: json:"instanceId" desc:"Instance ID"
  string instanceId = 8;
}

// CreateResp create instance response
message CreateResp {
  // @inject_tag: json:"instanceId" desc:"Instance ID"
  string instanceId = 1;
  // @inject_tag: json:"name" desc:"Instance name"
  string name = 2;
  // @inject_tag: json:"accessType" desc:"Deployment mode"
  AccessType accessType = 3;
  // @inject_tag: json:"status" desc:"Instance status"
  string status = 4;
  // @inject_tag: json:"mcpProtocol" desc:"MCP protocol"
  McpProtocol mcpProtocol = 5;
}

// DetailRequest instance detail request
message DetailRequest {
  // @inject_tag: json:"instanceId" uri:"instanceId" form:"instanceId" desc:"Instance ID"
  string instanceId = 1;
}

// DetailResp instance detail response
message DetailResp {
  // @inject_tag: json:"instanceId" desc:"Instance ID"
  string instanceId = 1;
  // @inject_tag: json:"name" desc:"Instance name"
  string name = 2;
  // @inject_tag: json:"accessType" desc:"Deployment mode"
  AccessType accessType = 3;
  // @inject_tag: json:"status" desc:"Instance status"
  string status = 4;
  // @inject_tag: json:"mcpProtocol" desc:"MCP protocol"
  McpProtocol mcpProtocol = 5;
  // @inject_tag: json:"notes" desc:"Notes"
  string notes = 6;
  // @inject_tag: json:"mcpServers" desc:"MCP server configuration"
  string mcpServers = 7;
  // @inject_tag: json:"port" desc:"Port"
  int32 port = 8;
  // @inject_tag: json:"initScript" desc:"Initialization script"
  string initScript = 9;
  // @inject_tag: json:"command" desc:"Startup command"
  string command = 10;
  // @inject_tag: json:"environmentVariables" desc:"Environment variables"
  map<string, string> environmentVariables = 11;
  // @inject_tag: json:"volumeMounts" desc:"Volume mount list"
  repeated VolumeMount volumeMounts = 12;
  // @inject_tag: json:"startupTimeout" desc:"Startup timeout (seconds)"
  int32 startupTimeout = 13;
  // @inject_tag: json:"runningTimeout" desc:"Running timeout (seconds)"
  int32 runningTimeout = 14;
  // @inject_tag: json:"environmentId" desc:"Environment ID"
  int32 environmentId = 15;
  // @inject_tag: json:"packageId,omitempty" desc:"Package ID, optional"
  string packageId = 16;
  // @inject_tag: json:"imgAddress" form:"imgAddress" desc:"Image address"
  string imgAddress = 17;
  // @inject_tag: json:"servicePath" form:"servicePath" desc:"Service path"
  string servicePath = 18;
  // @inject_tag: json:"iconPath" desc:"Icon path"
  string iconPath = 19;
  // @inject_tag: json:"enabledToken" desc:"Enable tokens"
  bool enabledToken = 20;
  // @inject_tag: json:"mcpServerId" desc:"MCP server ID"
  string mcpServerId = 22;
  // @inject_tag: json:"templateId" desc:"Template ID"
  int32 templateId = 23;
  // @inject_tag: json:"containerName" desc:"Container name"
  string containerName = 24;
  // @inject_tag: json:"containerServiceName" desc:"Container service name"
  string containerServiceName = 25;
  // @inject_tag: json:"containerIsReady" desc:"Container ready"
  bool containerIsReady = 26;
  // @inject_tag: json:"containerStatus" desc:"Container status"
  string containerStatus = 27;
  // @inject_tag: json:"containerLastMessage" desc:"Container last message"
  string containerLastMessage = 28;
  // @inject_tag: json:"openapiBaseUrl" desc:"Base access path"
  string openapiBaseUrl = 29;
}

// EditRequest edit instance request
message EditRequest {
  // @inject_tag: json:"instanceId" form:"instanceId" desc:"Instance ID"
  string instanceId = 1;
  // @inject_tag: json:"name" form:"name" desc:"Instance name"
  string name = 2;
  // @inject_tag: json:"mcpServers" form:"mcpServers" desc:"MCP server configuration"
  string mcpServers = 3;
  // @inject_tag: json:"port" form:"port" desc:"Port"
  int32 port = 4;
  // @inject_tag: json:"initScript" form:"initScript" desc:"Initialization script"
  string initScript = 5;
  // @inject_tag: json:"command" form:"command" desc:"Startup command"
  string command = 6;
  // @inject_tag: json:"environmentVariables" form:"environmentVariables" desc:"Environment variables"
  map<string, string> environmentVariables = 7;
  // @inject_tag: json:"volumeMounts" form:"volumeMounts" desc:"Volume mount list"
  repeated VolumeMount volumeMounts = 8;
  // @inject_tag: json:"startupTimeout" form:"startupTimeout" desc:"Startup timeout (seconds)"
  int32 startupTimeout = 9;
  // @inject_tag: json:"runningTimeout" form:"runningTimeout" desc:"Running timeout (seconds)"
  int32 runningTimeout = 10;
  // @inject_tag: json:"packageId,omitempty" form:"packageId" desc:"Package ID, optional"
  string packageId = 11;
  // @inject_tag: json:"imgAddress" form:"imgAddress" desc:"Image address"
  string imgAddress = 12;
  // @inject_tag: json:"notes" form:"notes" desc:"Notes"
  string notes = 13;
  // @inject_tag: json:"servicePath" form:"servicePath" desc:"Service path"
  string servicePath = 14;
  // @inject_tag: json:"iconPath" form:"iconPath" desc:"Icon path"
  string iconPath = 15;
}

// EditResp edit instance response
message EditResp {
  // @inject_tag: json:"instanceId" desc:"Instance ID"
  string instanceId = 1;
  // @inject_tag: json:"name" desc:"Instance name"
  string name = 2;
  // @inject_tag: json:"accessType" desc:"Deployment mode"
  AccessType accessType = 3;
  // @inject_tag: json:"status" desc:"Instance status"
  string status = 4;
  // @inject_tag: json:"mcpProtocol" desc:"MCP protocol"
  McpProtocol mcpProtocol = 5;
}

// ListRequest instance list request
message ListRequest {
  // @inject_tag: json:"page" form:"page" desc:"Page number"
  int32 page = 1;
  // @inject_tag: json:"pageSize" form:"pageSize" desc:"Page size"
  int32 pageSize = 2;
  // @inject_tag: json:"instanceName" form:"instanceName" desc:"Search keyword: instance name or ID"
  string instanceName = 3;
  // @inject_tag: json:"environmentId" form:"environmentId" desc:"Environment ID"
  int32 environmentId = 4;
  // @inject_tag: json:"accessType" form:"accessType" desc:"Deployment mode"
  AccessType accessType = 5;
  // @inject_tag: json:"status" form:"status" desc:"Instance status (active/inactive)"
  string status = 6;
  // Field number 7 is missing; fix containerStatus field number to 7
  // @inject_tag: json:"containerStatus" form:"containerStatus" desc:"Container status (pending/running/running-unready/init-timeout-stop/run-timeout-stop/exception-force-stop/manual-stop/create-failed)"
  string containerStatus = 7;
  // @inject_tag: json:"mcpProtocol" form:"mcpProtocol" desc:"MCP protocol"
  McpProtocol mcpProtocol = 12;
  // @inject_tag: json:"sortBy" form:"sortBy" desc:"Sort field (createdAt/updatedAt/instanceName)"
  string sortBy = 10;
  // @inject_tag: json:"sortOrder" form:"sortOrder" desc:"Sort order (asc/desc)"
  string sortOrder = 11;
}

// ListResp instance list response
message ListResp {
  // @inject_tag: json:"total" desc:"Total count"
  int64 total = 1;
  // @inject_tag: json:"page" desc:"Current page number"
  int32 page = 2;
  // @inject_tag: json:"pageSize" desc:"Page size"
  int32 pageSize = 3;
  // @inject_tag: json:"list" desc:"Instance list"
  repeated InstanceInfo list = 4;

  message InstanceInfo {
    // @inject_tag: json:"instanceId" desc:"Instance ID"
    string instanceId = 1;
    // @inject_tag: json:"instanceName" desc:"Instance name"
    string instanceName = 2;
    // @inject_tag: json:"accessType" desc:"Deployment mode"
    AccessType accessType = 3;
    // Remove duplicate accessType field, enum already indicates access mode
    // @inject_tag: json:"status" desc:"Instance status (active/inactive)"
    string status = 4;
    // @inject_tag: json:"environmentId" desc:"Environment ID"
    uint32 environmentId = 5;
    // @inject_tag: json:"environmentName" desc:"Environment name"
    string environmentName = 6;
    // @inject_tag: json:"containerStatus" desc:"Container status (pending/running/running-unready/init-timeout-stop/run-timeout-stop/exception-force-stop/manual-stop/create-failed)"
    string containerStatus = 7;
    // @inject_tag: json:"containerName" desc:"Container name"
    string containerName = 8;
    // @inject_tag: json:"containerServiceName" desc:"Container service name"
    string containerServiceName = 9;
    // @inject_tag: json:"containerIsReady" desc:"Container ready"
    bool containerIsReady = 10;
    // @inject_tag: json:"containerCreateOptions" desc:"Container create options (JSON)"
    string containerCreateOptions = 11;
    // @inject_tag: json:"containerLastMessage" desc:"Container last status message"
    string containerLastMessage = 12;
    // @inject_tag: json:"containerInitTimeoutStopAt" desc:"Container init timeout stop time (ms timestamp)"
    int64 containerInitTimeoutStopAt = 13;
    // @inject_tag: json:"containerRunTimeoutStopAt" desc:"Container run timeout stop time (ms timestamp)"
    int64 containerRunTimeoutStopAt = 14;
    // @inject_tag: json:"sourceConfig" desc:"MCP source service config (JSON)"
    string sourceConfig = 15;
    // @inject_tag: json:"iconPath" desc:"Icon path"
    string iconPath = 16;
    // @inject_tag: json:"servicePath" desc:"Service path"
    string servicePath = 17;
    // @inject_tag: json:"publicProxyPath" desc:"MCP public proxy service path"
    string publicProxyPath = 18;
    // @inject_tag: json:"isDeleted" desc:"Deleted"
    bool isDeleted = 19;
    // @inject_tag: json:"createdAt" desc:"Created at (ms timestamp)"
    string createdAt = 20;
    // @inject_tag: json:"updatedAt" desc:"Updated at (ms timestamp)"
    string updatedAt = 21;
    // @inject_tag: json:"mcpProtocol" desc:"MCP protocol"
    McpProtocol mcpProtocol = 22;
    // @inject_tag: json:"enabledToken" desc:"Enable tokens"
    bool enabledToken = 23;
    // @inject_tag: json:"proxyProtocol" desc:"MCP internal proxy protocol"
    McpProtocol proxyProtocol = 25;
    // @inject_tag: json:"sourceType" form:"sourceType" desc:"Instance source"
    SourceType sourceType = 26;
    // @inject_tag: json:"notes" form:"notes" desc:"Notes"
    string notes = 27;
    // @inject_tag: json:"openapiBaseUrl" desc:"Base access path"
    string openapiBaseUrl = 28;
  }
}

// RestartRequest restart instance request
message RestartRequest {
  // @inject_tag: json:"instanceId" form:"instanceId" desc:"Instance ID"
  string instanceId = 1;
}

// RestartResp restart instance response
message RestartResp {
  // @inject_tag: json:"instanceId" desc:"Instance ID"
  string instanceId = 1;
  // @inject_tag: json:"name" desc:"Instance name"
  string name = 2;
  // @inject_tag: json:"accessType" desc:"Deployment mode"
  AccessType accessType = 3;
  // @inject_tag: json:"status" desc:"Instance status"
  string status = 4;
  // @inject_tag: json:"message" desc:"Status message"
  string message = 5;
}

// VolumeMount volume mount configuration
message VolumeMount {
  // @inject_tag: json:"type" desc:"Volume type: hostPath, pvc, volume"
  string type = 1;
  // @inject_tag: json:"mountPath" desc:"Mount path"
  string mountPath = 2;
  // @inject_tag: json:"readOnly" desc:"Read only"
  bool readOnly = 3;
  // @inject_tag: json:"subPath" desc:"Sub path"
  string subPath = 4;
  // @inject_tag: json:"pvcName" desc:"PVC name"
  string pvcName = 5;
  // @inject_tag: json:"hostPath" desc:"Host path (required for hostPath type)"
  string hostPath = 6;
  // @inject_tag: json:"nodeName" desc:"Node name (required for hostPath type)"
  string nodeName = 7;
  // @inject_tag: json:"volumeName" desc:"Volume name (required for volume type)"
  string volumeName = 8;
}

// ContainerDeleteRequest container deletion request
message ContainerDeleteRequest {
  // @inject_tag: json:"instanceId" uri:"instanceId" form:"instanceId" desc:"Instance ID"
  string instanceId = 1;
}

// McpServersConfig server configuration
message McpServersConfig {
  // @inject_tag: json:"host" desc:"Host address"
  string host = 1;
  // @inject_tag: json:"port" desc:"Port"
  int32 port = 2;
  // @inject_tag: json:"protocol" desc:"Protocol type"
  string protocol = 3;
}

// GetStatusResp instance status probe response
message GetStatusResp {
  // @inject_tag: json:"instanceId" desc:"Instance ID"
  string instanceId = 1;
  // @inject_tag: json:"status" desc:"Instance status"
  string status = 2;
  // @inject_tag: json:"containerName" desc:"Container name"
  string containerName = 3;
  // @inject_tag: json:"runtimeType" desc:"Runtime type"
  string runtimeType = 4;
  // @inject_tag: json:"errorMessage" desc:"Error message"
  string errorMessage = 5;
  // @inject_tag: json:"warningEvents" desc:"Warning events"
  repeated ContainerEvent warningEvents = 6;
  // @inject_tag: json:"containerReady" desc:"Container ready"
  bool containerReady = 7;
  // @inject_tag: json:"serviceReady" desc:"Service ready"
  bool serviceReady = 8;
  // @inject_tag: json:"probeHttp" desc:"HTTP probe success"
  bool probeHttp = 9;
}

// ContainerEvent container event
message ContainerEvent {
  // @inject_tag: json:"type" desc:"Event type"
  string type = 1;
  // @inject_tag: json:"reason" desc:"Event reason"
  string reason = 2;
  // @inject_tag: json:"message" desc:"Event message"
  string message = 3;
  // @inject_tag: json:"firstTimestamp" desc:"First occurrence time (timestamp)"
  int64 firstTimestamp = 4;
  // @inject_tag: json:"lastTimestamp" desc:"Last occurrence time (timestamp)"
  int64 lastTimestamp = 5;
  // @inject_tag: json:"count" desc:"Occurrence count"
  int32 count = 6;
}

// DisabledRequest disable instance request
message DisabledRequest {
  // @inject_tag: json:"instanceId" form:"instanceId" uri:"instanceId" desc:"Instance ID"
  string instanceId = 1;
}

// DisabledResp disable instance response
message DisabledResp {
  // @inject_tag: json:"message" desc:"Response message"
  string message = 1;
}

// DeleteRequest delete instance request
message DeleteRequest {
  // @inject_tag: json:"instanceId" form:"instanceId" uri:"instanceId" desc:"Instance ID"
  string instanceId = 1;
}

// DeleteResp delete instance response
message DeleteResp {
  // @inject_tag: json:"message" desc:"Response message"
  string message = 1;
}

// LogsRequest view instance runtime logs request
message LogsRequest {
  // @inject_tag: json:"instanceId" form:"instanceId" uri:"instanceId" desc:"Instance ID"
  string instanceId = 1;
  // @inject_tag: json:"lines" form:"lines" desc:"Number of log lines, default 100"
  int32 lines = 2;
}

// LogsResp view instance runtime logs response
message LogsResp {
  // @inject_tag: json:"instanceId" desc:"Instance ID"
  string instanceId = 1;
  // @inject_tag: json:"isManaged" desc:"Managed instance"
  bool isManaged = 2;
  // @inject_tag: json:"logs" desc:"Log content, returned only for managed instances"
  string logs = 3;
  // @inject_tag: json:"message" desc:"Response message"
  string message = 4;
}

