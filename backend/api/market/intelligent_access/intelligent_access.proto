syntax = "proto3";

package intelligent_access;

import "google/api/annotations.proto";

option go_package = "github.com/kymo-mcp/mcpcan/api/market/intelligent_access";

enum IntelligentAccessType {
  Unknown = 0;
  DifyEnterprise = 1;
  Dify = 2;
  QAgent = 3;
  COZE = 4;
  N8N = 5;
}

enum SubType {
  UnknownSubType = 0;
  Team = 1;
  Person = 2;
}

message IntelligentAccess {
    int64 accessID = 1;
    string accessName = 2;
    string accessType = 3;
    string dbHost = 4;
    int32 dbPort = 5;
    string dbUser = 6;
    string dbPassword = 7;
    string dbName = 8;
    int64 createTime = 9;
    int64 updateTime = 10;

    string subType = 11;
    string enterpriseID = 12;

    string baseUrl = 13;
    string username = 14;
    string password = 15;
}

message CreateRequest {
    string accessName = 1;
    string accessType = 2;
    string dbHost = 3;
    int32 dbPort = 4;
    string dbUser = 5;
    string dbPassword = 6;
    string dbName = 7;

    string subType = 8;
    string enterpriseID = 9;

    string baseUrl = 13;
    string username = 14;
    string password = 15;
}

message CreateResponse {
    IntelligentAccess intelligentAccess = 1;
}

message UpdateRequest {
    int64 accessID = 1;
    string accessName = 2;
    string dbHost = 4;
    int32 dbPort = 5;
    string dbUser = 6;
    string dbPassword = 7;
    string dbName = 8;

    string subType = 9;
    string enterpriseID = 10;

    string baseUrl = 11;
    string username = 12;
    string password = 13;
}

message UpdateResponse {
    IntelligentAccess intelligentAccess = 1;
}

message DeleteRequest {
    int64 accessID = 1;
}

message DeleteResponse {}

message GetRequest {
    int64 accessID = 1;
}

message GetResponse {
    IntelligentAccess intelligentAccess = 1;
}

message ListRequest {}

message ListResponse {
    repeated IntelligentAccess list = 1;
}

message TestConnectionRequest {
  string dbHost = 1;
  int32 dbPort = 2;
  string dbUser = 3;
  string dbPassword = 4;
  string dbName = 5;
}

message TestConnectionResponse {
  bool success = 1;
  string message = 2;
}

message ListUserSpaceRequest {
    int64 accessID = 1;
    repeated string instancesIDs = 2;
    string cookie = 3;
}

message HeaderInfo {
  // 平台的网关 token
  string token = 1;
  // 透传的 headers
  map<string, string> headers = 2;
}


message UserSpace {
  string userID = 1;
  string tenantID = 2;
  string userName = 3;
  string tenantName = 4;
  string encryptPublicKey = 5;

  // key 为 实例ID, value 为每个实例需要创建的 header 内容
  map<string, HeaderInfo> headers = 6;
}

message ListUserSpaceResponse {
  repeated UserSpace userSpaces = 1;
}

message CheckN8NRequest {
  string baseUrl = 1;
  string username = 2;
  string password = 3;

  int64 accessID = 4;
}

message CheckN8NResponse {
  bool loginStatus = 1;
  bool pluginStatus = 2;
  string message = 3;
}

message InstallN8NPluginRequest {
  string baseUrl = 1;
  string username = 2;
  string password = 3;

  int64 accessID = 4;
}

message InstallN8NPluginResponse {
  bool success = 1;
  string message = 2;
}


service IntelligentAccessService {
    rpc Create(CreateRequest) returns (CreateResponse) {
        option (google.api.http) = {
            post: "/intelligent_access"
            body: "*"
        };
    }
    rpc Update(UpdateRequest) returns (UpdateResponse) {
        option (google.api.http) = {
            put: "/intelligent_access/edit"
            body: "*"
        };
    }
    rpc Delete(DeleteRequest) returns (DeleteResponse) {
        option (google.api.http) = {
            delete: "/intelligent_access/delete"
        };
    }
    rpc Get(GetRequest) returns (GetResponse) {
        option (google.api.http) = {
            get: "/intelligent_access/{accessID}"
        };
    }
    rpc List(ListRequest) returns (ListResponse) {
        option (google.api.http) = {
            get: "/intelligent_access/list"
        };
    }
    rpc TestConnection(TestConnectionRequest) returns (TestConnectionResponse) {
        option (google.api.http) = {
          post: "/intelligent_access/test-connection"
          body: "*"
        };
    }

    rpc ListUserSpace(ListUserSpaceRequest) returns (ListUserSpaceResponse) {
      option (google.api.http) = {
        post: "/intelligent_access/list-user-space"
        body: "*"
      };
    }

    rpc CheckN8N(CheckN8NRequest) returns (CheckN8NResponse) {
      option (google.api.http) = {
        post: "/intelligent_access/check-n8n"
        body: "*"
      };
    }
    rpc InstallN8NPlugin(InstallN8NPluginRequest) returns (InstallN8NPluginResponse) {
      option (google.api.http) = {
        post: "/intelligent_access/install-n8n-plugin"
        body: "*"
      };
    }
}