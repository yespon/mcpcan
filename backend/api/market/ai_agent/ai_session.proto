syntax = "proto3";

package ai_agent;

import "google/api/annotations.proto";

option go_package = "github.com/kymo-mcp/mcpcan/api/market/ai_agent";

message AiSession {
    int64 id = 1;
    string name = 2;
    int64 modelAccessID = 3;
    string toolsConfig = 4; // JSON string
    int32 maxContext = 5;
    int64 createTime = 6;
    int64 updateTime = 7;
}

message AiMessage {
    int64 id = 1;
    int64 sessionID = 2;
    string role = 3;
    string content = 4;
    string toolCalls = 5;
    string toolCallID = 6;
    int32 promptTokens = 7;
    int32 completionTokens = 8;
    int32 totalTokens = 9;
    int64 createTime = 10;
}

message CreateSessionRequest {
    string name = 1;
    int64 modelAccessID = 2;
    string toolsConfig = 3;
    int32 maxContext = 4;
}

message CreateSessionResponse {
    AiSession session = 1;
}

message UpdateSessionRequest {
    int64 id = 1;
    string name = 2;
    string toolsConfig = 3;
    int32 maxContext = 4;
    int64 modelAccessID = 5;
}

message UpdateSessionResponse {
    AiSession session = 1;
}

message DeleteSessionRequest {
    int64 id = 1;
}

message DeleteSessionResponse {
    bool success = 1;
}

message GetSessionRequest {
    int64 id = 1;
}

message GetSessionResponse {
    AiSession session = 1;
}

message ListSessionsRequest {
    int32 page = 1;
    int32 pageSize = 2;
}

message ListSessionsResponse {
    repeated AiSession list = 1;
    int64 total = 2;
}

message GetSessionMessagesRequest {
    int64 sessionID = 1;
    int32 limit = 2; // Last N
}

message GetSessionMessagesResponse {
    repeated AiMessage list = 1;
}

service AiSessionService {
    rpc Create(CreateSessionRequest) returns (CreateSessionResponse) {
        option (google.api.http) = {
            post: "/ai/sessions"
            body: "*"
        };
    }
    rpc Update(UpdateSessionRequest) returns (UpdateSessionResponse) {
        option (google.api.http) = {
            put: "/ai/sessions"
            body: "*"
        };
    }
    rpc Delete(DeleteSessionRequest) returns (DeleteSessionResponse) {
        option (google.api.http) = {
            delete: "/ai/sessions/{id}"
        };
    }
    rpc Get(GetSessionRequest) returns (GetSessionResponse) {
        option (google.api.http) = {
            get: "/ai/sessions/{id}"
        };
    }
    rpc List(ListSessionsRequest) returns (ListSessionsResponse) {
        option (google.api.http) = {
            get: "/ai/sessions"
        };
    }
    rpc GetMessages(GetSessionMessagesRequest) returns (GetSessionMessagesResponse) {
        option (google.api.http) = {
            get: "/ai/sessions/{sessionID}/messages"
        };
    }
}
