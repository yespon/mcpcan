components:
  schemas:
    codeDownloadPackageResponse:
      type: object
      title: DownloadPackageResponse 下载代码包响应
      properties:
        fileContent:
          type: string
          format: byte
          title: '@inject_tag: json:"fileContent" desc:"文件内容"'
    codeEditCodeFileRequest:
      type: object
      title: EditCodeFileRequest 编辑代码文件请求
      properties:
        content:
          type: string
          title: >-
            @inject_tag: form:"content" binding:"required" json:"content"
            desc:"文件内容"
        filePath:
          type: string
          title: >-
            @inject_tag: form:"filePath" binding:"required" json:"filePath"
            desc:"文件路径"
        packageId:
          type: string
          title: >-
            @inject_tag: form:"packageId" binding:"required" json:"packageId"
            desc:"包ID"
    codeEditCodeFileResponse:
      type: object
      title: EditCodeFileResponse 编辑代码文件响应
      properties:
        message:
          type: string
          title: '@inject_tag: json:"message" desc:"响应消息"'
        success:
          type: boolean
          title: '@inject_tag: json:"success" desc:"是否成功"'
    codeFileNode:
      type: object
      title: FileNode 文件节点结构
      properties:
        children:
          type: array
          title: '@inject_tag: json:"children,omitempty" desc:"子节点"'
          items:
            $ref: '#/components/schemas/codeFileNode'
        isDir:
          type: boolean
          title: '@inject_tag: json:"isDir" desc:"是否为目录"'
        name:
          type: string
          title: '@inject_tag: json:"name" desc:"文件名"'
        path:
          type: string
          title: '@inject_tag: json:"path" desc:"文件路径"'
        size:
          type: string
          format: int64
          title: '@inject_tag: json:"size,omitempty" desc:"文件大小"'
    codeGetCodeFileResponse:
      type: object
      title: GetCodeFileResponse 获取代码文件内容响应
      properties:
        content:
          type: string
          title: '@inject_tag: json:"content" desc:"文件内容"'
    codeGetCodeTreeResponse:
      type: object
      title: GetCodeTreeResponse 获取代码包结构响应
      properties:
        fileStructure:
          $ref: '#/components/schemas/codeFileNode'
    codeUploadPackageRequest:
      type: object
      title: UploadPackageRequest 代码包上传请求
      properties:
        file:
          type: string
          format: byte
          title: '@inject_tag: form:"file" binding:"required" desc:"上传文件"'
    codeUploadPackageResponse:
      type: object
      title: UploadPackageResponse 代码包上传响应
      properties:
        packageId:
          type: string
          title: '@inject_tag: json:"packageId" desc:"包ID"'
        packagePath:
          type: string
          title: '@inject_tag: json:"packagePath" desc:"包路径"'
    protobufAny:
      type: object
      properties:
        '@type':
          type: string
      additionalProperties: {}
    rpcStatus:
      type: object
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
        details:
          type: array
          items:
            $ref: '#/components/schemas/protobufAny'
    McpEnvironmentServiceTestConnectivityBody:
      type: object
      title: TestConnectivityRequest connectivity test request
      properties: {}
    McpEnvironmentServiceUpdateEnvironmentBody:
      type: object
      title: UpdateEnvironmentRequest update environment request
      properties:
        config:
          type: string
          title: >-
            @inject_tag: json:"config" form:"config" desc:"connection
            configuration"
        environment:
          $ref: '#/components/schemas/mcp_environmentMcpEnvironmentType'
        name:
          type: string
          title: '@inject_tag: json:"name" form:"name" desc:"environment name"'
        namespace:
          type: string
          title: '@inject_tag: json:"namespace" form:"namespace" desc:"namespace"'
    googlerpcStatus:
      type: object
      properties:
        code:
          type: integer
          format: int32
        details:
          type: array
          items:
            $ref: '#/components/schemas/protobufAny'
        message:
          type: string
    instanceContainerEvent:
      type: object
      title: ContainerEvent 容器事件
      properties:
        count:
          type: integer
          format: int32
          title: '@inject_tag: json:"count" desc:"发生次数"'
        firstTimestamp:
          type: string
          format: int64
          title: '@inject_tag: json:"firstTimestamp" desc:"首次发生时间（时间戳）"'
        lastTimestamp:
          type: string
          format: int64
          title: '@inject_tag: json:"lastTimestamp" desc:"最后发生时间（时间戳）"'
        message:
          type: string
          title: '@inject_tag: json:"message" desc:"事件消息"'
        reason:
          type: string
          title: '@inject_tag: json:"reason" desc:"事件原因"'
        type:
          type: string
          title: '@inject_tag: json:"type" desc:"事件类型"'
    instanceDeleteResp:
      type: object
      title: 删除实例响应
      properties:
        message:
          type: string
          title: '@inject_tag: json:"message" desc:"响应消息"'
    instanceDisabledRequest:
      type: object
      title: 禁用实例请求
      properties:
        instanceId:
          type: string
          title: >-
            @inject_tag: json:"instanceId" form:"instanceId" uri:"instanceId"
            desc:"实例ID"
    instanceDisabledResp:
      type: object
      title: 禁用实例响应
      properties:
        message:
          type: string
          title: '@inject_tag: json:"message" desc:"响应消息"'
    instanceGetStatusResp:
      type: object
      title: GetStatusResp 实例状态探测响应数据
      properties:
        containerName:
          type: string
          title: '@inject_tag: json:"containerName" desc:"容器名称"'
        containerReady:
          type: boolean
          title: '@inject_tag: json:"containerReady" desc:"容器是否就绪"'
        errorMessage:
          type: string
          title: '@inject_tag: json:"errorMessage" desc:"错误信息"'
        instanceId:
          type: string
          title: '@inject_tag: json:"instanceId" desc:"实例ID"'
        probeHttp:
          type: boolean
          title: '@inject_tag: json:"probeHttp" desc:"HTTP 探测是否成功"'
        runtimeType:
          type: string
          title: '@inject_tag: json:"runtimeType" desc:"运行时类型"'
        serviceReady:
          type: boolean
          title: '@inject_tag: json:"serviceReady" desc:"服务是否就绪"'
        status:
          type: string
          title: '@inject_tag: json:"status" desc:"实例状态"'
        warningEvents:
          type: array
          title: '@inject_tag: json:"warningEvents" desc:"警告事件"'
          items:
            $ref: '#/components/schemas/instanceContainerEvent'
    instanceLogsRequest:
      type: object
      title: LogsRequest 查看实例运行日志请求
      properties:
        instanceId:
          type: string
          title: >-
            @inject_tag: json:"instanceId" form:"instanceId" uri:"instanceId"
            desc:"实例ID"
        lines:
          type: integer
          format: int32
