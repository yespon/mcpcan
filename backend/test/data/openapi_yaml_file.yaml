openapi: 3.0.0
info:
  title: PetStore API
  version: 1.0.0
  description: A sample PetStore API in YAML format
paths:
  /pets:
    get:
      summary: List all pets
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
components:
  schemas:
    Pet:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
servers:
  - description: Fastly API server
    url: https://api.fastly.com