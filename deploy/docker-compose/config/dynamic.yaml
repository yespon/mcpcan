http:
  middlewares:
    strip-api-prefix:
      stripPrefix:
        prefixes:
          - "/api"
    strip-web-prefix:
      stripPrefix:
        prefixes:
          - "/"
    external-auth:
      forwardAuth:
        address: "http://mcp-authz-svc:8081/authz/validate"
        trustForwardHeader: true
        authRequestHeaders:
          - "Authorization"
          - "X-API-Key"
          - "Cookie"
          - "User-Agent"
        authResponseHeaders:
          - "X-Consum-User-Id"
          - "X-Custom-User-Info"
          - "X-Trace-Id"

  routers:
    authz-public:
      rule: "PathPrefix(`/api/authz/login`) || PathPrefix(`/api/authz/logout`) || PathPrefix(`/api/authz/register`) || PathPrefix(`/api/authz/refresh`) || PathPrefix(`/api/authz/validate`) || PathPrefix(`/api/authz/encryption-key`) || PathPrefix(`/health`) || PathPrefix(`/api/health`)"
      service: "authz-service"
      entryPoints: ["web"]
      middlewares:
        - "strip-api-prefix"
      priority: 100

    market-public:
      rule: "PathPrefix(`/api/market/code/download`) || PathPrefix(`/api/market/openapi/download`)"
      service: "market-service"
      entryPoints: ["web"]
      middlewares:
        - "strip-api-prefix"
      priority: 100

    authz-protected:
      rule: "PathPrefix(`/api/authz`)"
      service: "authz-service"
      entryPoints: ["web"]
      middlewares:
        - "strip-api-prefix"
        - "external-auth"

    market-router:
      rule: "PathPrefix(`/api/market`)"
      service: "market-service"
      entryPoints: ["web"]
      middlewares:
        - "strip-api-prefix"
        - "external-auth"

    mcp-gateway:
      rule: "PathPrefix(`/mcp-gateway`)"
      service: "market-service"
      entryPoints: ["web"]
      middlewares: []
      priority: 1000

    web-router:
      rule: "PathPrefix(`/`)"
      service: "web-service"
      entryPoints: ["web"]
      middlewares:
        - "strip-web-prefix"
      priority: 1

  services:
    authz-service:
      loadBalancer:
        servers:
          - url: "http://mcp-authz-svc:8081"

    market-service:
      loadBalancer:
        servers:
          - url: "http://mcp-market-svc:8080"

    web-service:
      loadBalancer:
        servers:
          - url: "http://mcp-web-svc:3000"
