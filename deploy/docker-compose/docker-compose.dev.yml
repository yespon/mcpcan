services:
  # MySQL & Redis 使用本地已有的镜像
  mysql:
    image: mysql:8.0.30
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./config/mysql.conf:/etc/mysql/conf.d/mysql.conf:ro
      - ./config/mysql.init.sql:/docker-entrypoint-initdb.d/mysql.init.sql:ro
    ports:
      - "${MYSQL_PUBLIC_PORT:-31306}:${MYSQL_PORT:-3306}"
    networks:
      mcpcan-network:
        aliases:
          - mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD:-root}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:6-alpine
    container_name: redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PUBLIC_PORT:-31379}:${REDIS_PORT:-6379}"
    networks:
      mcpcan-network:
        aliases:
          - redis
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-123456}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Market 服务：使用热加载
  mcp-market-svc:
    build:
      context: ../../
      dockerfile: ./deploy/docker-compose/Dockerfile.go.dev
    container_name: mcp-market-dev
    volumes:
      - ../../backend:/app:cached
      - ./air.market.toml:/app/.air.toml:ro
      - ./config/market.yaml:/app/config/market.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOST_DATA_PATH:-./data/mcpcan}:/data/mcpcan
      - go-pkg-cache:/go/pkg/mod # 持久化 Go 模块
      - go-build-cache:/root/.cache/go-build # 持久化编译缓存
    environment:
      - GOPROXY=https://goproxy.cn,direct
      - GO111MODULE=on
      - CODE_MODE=EnterpriseCode
      - MCP_INTERNAL_BASE_URL=http://mcp-entry-svc
    ports:
      - "8080:8080"
      - "12345:2345"
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor=unconfined
    networks:
      mcpcan-network:
        aliases:
          - mcp-market-svc
          - market-service
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Authz 服务：使用热加载
  mcp-authz-svc:
    build:
      context: ../../
      dockerfile: ./deploy/docker-compose/Dockerfile.go.dev
    container_name: mcp-authz-dev
    volumes:
      - ../../backend:/app:cached
      - ./air.authz.toml:/app/.air.toml:ro
      - ./config/authz.yaml:/app/config/authz.yaml:ro
      - ${HOST_DATA_PATH:-./data/mcpcan}:/data/mcpcan
      - go-pkg-cache:/go/pkg/mod # 共享 Go 模块缓存
      - go-build-cache:/root/.cache/go-build # 共享编译缓存
    environment:
      - GOPROXY=https://goproxy.cn,direct
      - GO111MODULE=on
      - CODE_MODE=EnterpriseCode
    ports:
      - "18081:8081"
      - "12346:2346"
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor=unconfined
    networks:
      mcpcan-network:
        aliases:
          - mcp-authz-svc
          - authz-service
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  mcp-web-svc:
    build:
      context: ../../
      dockerfile: ./deploy/docker-compose/Dockerfile.web.dev
    container_name: mcp-web-dev
    volumes:
      - ../../frontend:/app:cached
      - /app/node_modules # 关键：使用匿名卷隔离 node_modules
      - ./config/env.js:/app/public/env.js:ro
      - ${HOST_DATA_PATH:-./data/mcpcan}/static:/app/public/static
    # 不对外暴露 3000，避免端口冲突；traefik 通过内部网络 mcp-web-svc:3000 访问
    environment:
      - VITE_API_BASE_URL=/api
      - NODE_ENV=development
    command: sh -c "pnpm install && pnpm dev --host 0.0.0.0 --port 3000 --strictPort --no-open"
    networks:
      mcpcan-network:
        aliases:
          - mcp-web-svc
          - web-service

  # Gateway / Entry (Traefik) - 与正式部署一致，使用 80 端口
  mcp-entry-svc:
    image: traefik:v3.6.9
    container_name: mcp-entry-dev
    environment:
      - REGISTORY_IMAGE_MIRROR=${REGISTRY_PREFIX}
      - DOCKER_API_VERSION=1.44
      - DOCKER_HOST=unix:///var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"    # 主入口，与正式部署完全一致
      - "8090:8080" # Traefik Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/traefik.yaml:/etc/traefik/traefik.yaml:ro
      - ./config/dynamic.yaml:/etc/traefik/dynamic/dynamic.yaml:ro
    networks:
      - mcpcan-network
    command: traefik
    depends_on:
      - mcp-web-svc
      - mcp-market-svc
      - mcp-authz-svc

networks:
  mcpcan-network:
    driver: bridge

volumes:
  go-pkg-cache:
  go-build-cache:
  mysql-data:
  redis-data:
