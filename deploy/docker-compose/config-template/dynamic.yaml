# dynamic.yaml

http:
  middlewares:
    # Middleware to strip "${API_PATH_RULE}" prefix from the path
    strip-api-prefix:
      stripPrefix:
        prefixes:
          - "${API_PATH_RULE}"
    strip-web-prefix:
      stripPrefix:
        prefixes:
          - "${WEB_PATH_RULE}"
    # External Authentication Middleware (Forward Auth)
    external-auth:
      forwardAuth:
        address: "http://${MCP_AUTHZ_SERVICE_NAME}:${MCP_AUTHZ_SERVICE_PORT}/authz/validate"
        trustForwardHeader: true
        authRequestHeaders:
          - "Authorization"
          - "X-API-Key"
          - "Cookie"
          - "User-Agent"
        authResponseHeaders:
          - "X-Consum-User-Id"
          - "X-Custom-User-Info"
          - "X-Trace-Id"

    # MCP Authentication Middleware (Market/Gateway) - DEPRECATED: Moving auth to sidecar
    # mcp-gateway-forward-auth:
    #   forwardAuth:
    #     address: "http://${MCP_MARKET_SERVICE_NAME}:${MCP_MARKET_SERVICE_PORT}/market/gateway/auth"
    #     trustForwardHeader: true
    #     # 允许 Market 服务读取客户端的各类 Header
    #     authRequestHeaders:
    #       - "Authorization"
    #       - "API-Key"
    #       - "X-API-Key"
    #       - "Content-Type"
    #       - "Accept"
    #       - "User-Agent"
    #       - "X-Request-Id"
    #       - "X-Session-Id"
    #     # 允许 Market 服务将转换后的 Header 注入/覆盖到上游请求
    #     authResponseHeaders:
    #       - "X-Mcp-Instance-Id"
    #       - "X-Mcp-User-Id"
    #       - "Authorization" # 关键：允许 Token 转换
    #       - "API-Key" # 关键：允许 Token 转换
    #       - "X-API-Key" # 关键 : 允许 Token 转换
    #       - "X-Custom-Metadata"
    #       - "X-Trace-Id"

  routers:
    # =========================================================================
    # HTTP Routers (Port 80)
    # =========================================================================

    # Router for Public Authz endpoints (HTTP)
    authz-public:
      rule: "PathPrefix(`${API_PATH_RULE}/authz/login`) || PathPrefix(`${API_PATH_RULE}/authz/logout`) || PathPrefix(`${API_PATH_RULE}/authz/register`) || PathPrefix(`${API_PATH_RULE}/authz/refresh`) || PathPrefix(`${API_PATH_RULE}/authz/validate`) || PathPrefix(`${API_PATH_RULE}/authz/encryption-key`) || PathPrefix(`/health`) || PathPrefix(`${API_PATH_RULE}/health`)"
      service: "authz-service"
      entryPoints: ["web"]
      middlewares:
        - "strip-api-prefix"
      priority: 100

    market-pulic:
      rule: "PathPrefix(`${API_PATH_RULE}/market/code/download`) || PathPrefix(`${API_PATH_RULE}/market/openapi/download`)"
      service: "market-service"
      entryPoints: ["web"]
      middlewares:
        - "strip-api-prefix"
      priority: 100

    # Router for Protected Authz endpoints
    # Requires authentication
    authz-protected:
      rule: "PathPrefix(`${API_PATH_RULE}/authz`)"
      service: "authz-service"
      entryPoints: ["web"]
      middlewares:
        - "strip-api-prefix"
        - "external-auth"
      # Priority is automatically determined by rule length, but specific routes (longer) take precedence

    # Router for Market endpoints
    # Requires authentication
    market-router:
      rule: "PathPrefix(`${API_PATH_RULE}/market`)"
      service: "market-service"
      entryPoints: ["web"]
      middlewares:
        - "strip-api-prefix"
        - "external-auth"

    mcp-gateway:
      rule: "PathPrefix(`/mcp-gateway`)"
      service: "market-service"
      entryPoints: ["web"]
      middlewares: []
      priority: 1000

    # Router for the root web service
    # Lower priority to avoid conflicts with ${API_PATH_RULE} routes
    web-router:
      rule: "PathPrefix(`${WEB_PATH_RULE}`)"
      service: "web-service"
      entryPoints: ["web"]
      middlewares:
        - "strip-web-prefix"
      priority: 1 # Lower priority

  services:
    # Authz Service Definition
    authz-service:
      loadBalancer:
        servers:
          - url: "http://${MCP_AUTHZ_SERVICE_NAME}:${MCP_AUTHZ_SERVICE_PORT}"

    # Market Service Definition
    market-service:
      loadBalancer:
        servers:
          - url: "http://${MCP_MARKET_SERVICE_NAME}:${MCP_MARKET_SERVICE_PORT}"
          # - url: "http://host.docker.internal:${MCP_MARKET_SERVICE_PORT}"

    # Web Service Definition
    web-service:
      loadBalancer:
        servers:
          - url: "http://${MCP_WEB_SERVICE_NAME}:${MCP_WEB_SERVICE_PORT}"
        # serversTransport: "https-skip-verify-transport"
