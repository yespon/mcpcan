runMode: ${RUN_MODE}
server:
  serviceName: ${MCP_AUTHZ_SERVICE_NAME}
  httpPort: ${MCP_AUTHZ_SERVICE_PORT}
secret: ${APP_SECRET}
database:
  mysql:
    host: ${MYSQL_HOST}
    port: ${MYSQL_PORT}
    database: ${MYSQL_DATABASE}
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}
    password: ${REDIS_PASSWORD}
    db: 0
log:
  level: debug
  format: json
storage:
  rootPath: /data/mcpcan
  codePath: /data/mcpcan/code-package
  staticPath: /data/mcpcan/static
